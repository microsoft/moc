syntax = "proto3";
option go_package = "github.com/microsoft/moc/rpc/cloudagent/network";
package moc.cloudagent.network;

import "google/protobuf/wrappers.proto";
import "moc_common_common.proto";
import "moc_common_networkcommon.proto";

message LogicalNetworkRequest {
	repeated LogicalNetwork LogicalNetworks = 1;
	Operation OperationType = 2;
}

message LogicalNetworkResponse {
	repeated LogicalNetwork LogicalNetworks = 1;
	google.protobuf.BoolValue Result = 2;
	string  Error = 3;
}

message LogicalNetworkPrecheckRequest {
	repeated LogicalNetwork LogicalNetworks = 1;
}

message LogicalNetworkPrecheckResponse {
	// The precheck result: true if the precheck criteria is passed; otherwise, false
	google.protobuf.BoolValue Result = 1;

	// The error message if the precheck is not passed; otherwise, empty string
	string Error = 2;
}

message LogicalNetwork {
	string name = 1;
	string id = 2;
	repeated LogicalSubnet subnets = 3;
	bool networkVirtualizationEnabled = 4;
	Status status = 5;
	string locationName = 6;
	string macPoolName = 7 [(sensitive) = true];
	Tags tags = 8;
	repeated AdvancedNetworkPolicy advancedPolicies = 9;
}

message LogicalSubnet {
	string name = 1;
	string id = 2;
	string addressPrefix = 3;
	repeated Route routes = 4;
	IPAllocationMethod allocation = 5;
	uint32 vlan = 6;
	repeated IPPool ipPools = 7;
	Dns dns = 8 [(sensitive) = true]; 
	bool isPublic = 9; // Indicates IPPools from this subnet can be used to allocate public IP address by SDN.
	Tags tags = 10;
	NetworkSecurityGroupReference networkSecurityGroupRef = 11;
}

service LogicalNetworkAgent {
	rpc Invoke(LogicalNetworkRequest) returns (LogicalNetworkResponse) {}
	
	// Prechecks whether the system is able to create specified logical networks (but does not actually create them).
	rpc Precheck(LogicalNetworkPrecheckRequest) returns (LogicalNetworkPrecheckResponse) {}

	// Replaces the registeredIPAddresses list on each referenced subnet
	// (subnet-scoped full-replace) and applies the resulting add / remove
	// delta to the IPAM bitmap.
	//
	// This RPC is independent of spec Update: it does not run Validate or
	// validateUpdate, does not touch ProvisionState, and does not fan out
	// to nodeagents.
	rpc UpdateRegisteredIPs(LogicalNetworkIPUpdateRequest) returns (LogicalNetworkIPUpdateResponse) {}
}

message LogicalNetworkIPUpdateRequest {
	// Identifies the target LNET.
	string LocationName = 1;
	string Name = 2;

	// Desired registered-IP list for each subnet. Each list replaces
	// the stored list across every pool in that subnet. MOC routes each
	// IP to the correct pool by range internally.
	repeated LogicalSubnetIPUpdate IPUpdates = 3;
}

message LogicalSubnetIPUpdate {
	string SubnetName = 1;
	repeated string RegisteredIPAddresses = 2 [(sensitive) = true];
}

message LogicalNetworkIPUpdateResponse {
	// One list of persisted IPs for each subnet (full-replace semantics).
	// Only trustworthy when the gRPC status is OK.
	repeated LogicalSubnetIPUpdate PersistedIPs = 1;

	// IP-level failures. Per-IP validation/allocation failures (e.g., IP
	// already taken, IP outside CIDR). These are returned alongside
	// PersistedIPs as normal "partial success" outcomes; the gRPC status
	// is still OK in this case. Whole-batch / infrastructure failures
	// (e.g. store persistence) are reported via the gRPC status code
	// instead and do not populate this list.
	repeated IPAddressUpdateFailure Failures = 2;
}

