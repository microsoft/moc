syntax = "proto3";
option go_package = "github.com/microsoft/moc/rpc/common";
package moc;

import "moc_common_common.proto";

message Dns {
	repeated string servers = 1;
	string domain = 2;
	repeated string search = 3;
	repeated string options = 4;
}

enum Protocol {
	All = 0;
	Tcp = 1;
	Udp = 2;
	Icmpv4 = 3;
	Icmpv6 = 4;
}

enum IPAllocationMethod {
	Invalid = 0;
	Dynamic = 1;
	Static = 2;
}

enum IPPoolType {
	VM = 0;
	VIPPool = 1;
}

enum NetworkType {
	VIRTUAL_NETWORK = 0;
	LOGICAL_NETWORK = 1;
	UNDEFINED = 2;
}

enum IPVersion {
	IPv4 = 0;
	IPv6 = 1;
}

message IPPoolInfo {
	string used = 1;
	string available = 2;
}

message IPPool {
	string name = 1;
	IPPoolType type = 2;
	string start = 3;
	string end = 4;
	IPPoolInfo info = 5;
	Tags tags = 6;
	repeated string registeredIPAddresses = 7 [(sensitive) = true];
}

// IPAddressUpdateFailure is the single-IP failure record returned by
// UpdateRegisteredIPs. Shared between the LogicalNetwork and VirtualNetwork
// flows.
message IPAddressUpdateFailure {
	string SubnetName = 1;
	string IPAddress = 2 [(sensitive) = true];
	IPUpdateErrorCode Code = 3;
	string Error = 4;
}

enum IPUpdateErrorCode {
	IP_UPDATE_UNKNOWN = 0;

	// Malformed IP literal (parse failure).
	IP_UPDATE_INVALID_FORMAT = 1;

	// IP does not fall within any pool's [Start, End] range on this subnet.
	IP_UPDATE_OUT_OF_RANGE = 2;

	// Subnet name in the request is not present on the stored network spec.
	IP_UPDATE_SUBNET_NOT_FOUND = 3;

	// The IPAM bitmap bit is already set by another owner - a NIC, a
	// LoadBalancer, or a system reservation (gateway / network /
	// broadcast / DNS) - and the IP is not currently in the registered
	// list. Registering it would create two owners for one bitmap bit;
	// a later release would then clear the bit out from under the real
	// owner.
	IP_UPDATE_ALREADY_ALLOCATED = 4;

	// Subnet exists in the network spec but declares no IPPools.
	// registeredIPAddresses needs at least one pool to route each IP into,
	// and without pools there is no IPAM bitmap to reserve against.
	IP_UPDATE_NO_POOLS_IN_SUBNET = 5;
}

message Route {
	string nextHop = 1;
	string destinationPrefix = 2;
	uint32 metric = 3;
}

// Resource reference is intended to be used as a general component of specific, named resource references
message ResourceReference {
	string name = 1;
}

message NetworkSecurityGroupReference {
	ResourceReference resourceRef = 1;
}

message NetworkReference {
	ResourceReference resourceRef = 1;
	NetworkType networkType = 2;
}

message SubnetReference {
	NetworkReference network = 1;
	ResourceReference resourceRef = 2;
}
message PublicIPAddressReference {
	ResourceReference resourceRef = 1;
}

enum NetworkPolicyType {
	INVALID = 0;
	// Denotes SDN Policies. Disabling SDN policy disables all SDN features.
	SDN = 1;
}

message AdvancedNetworkPolicy {
	NetworkPolicyType type = 1;
	bool enabled = 2;
}


message ProbeReference {
	ResourceReference resourceRef = 1;
}

message FrontendIPConfigurationReference {
	ResourceReference resourceRef = 1;
}

message LoadBalancerReference {
	ResourceReference resourceRef = 1;
}

message BackendAddressPoolReference {
	ResourceReference resourceRef = 1;
	LoadBalancerReference loadBalancerRef = 2;
}